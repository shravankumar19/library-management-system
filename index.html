<div class="login-bg hide" id="login">
    <div class="container">
        <h2>User Login</h2>

        <form action="login.php" method="POST">

        <label>Username or Email:</label>
        <input type="text" id="loginuser" name="username">

        <label>Password:</label>
        <input type="password" id="loginpass" name="password">

        <div class="right">
            <a onclick="showPage('forgot')">Forgot password?</a>

        </form>

        </div>
    </div>

<!-- USER SIGNUP -->
<div class="signup-bg hide" id="signup">
    <div class="container">
        <h2>SignUp</h2>
        <label>Full Name:</label>
        <input type="text" id="fullname">

        <label>Email:</label>
        <input type="text" id="signupEmail">

        <label>Age:</label>
        <input type="number" id="signupAge" min="10">

        <!-- GENDER ADDED -->
        <label>Gender:</label>
        <select id="signupGender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select><br><br>

        <label>Username:</label>
        <input type="text" id="suUsername">

        <label>Password:</label>
        <input type="password" id="suPassword" name="password">

        <label>Confirm Password:</label>
        <input type="password" id="suConfirmPassword" name="password">

        <p id="passMsg" style="color:red; display:none;">Passwords do not match!</p>

        <label>Phone No:</label>
        <input type="text" id="signupPhone" value="+91" oninput="formatIndianPhone(this)">

        <button class="small-btn" onclick="sendSignupOTP()">Send OTP</button>

        <div id="signupOtpDiv" style="display:none;">
            <label>Enter OTP:</label>
            <input type="text" id="signupOtp">
        </div>

        <button class="full-btn" onclick="signup()">SignUp</button>

        <div class="link">
            Already a member? <a onclick="showPage('login')">Login here</a>
        </div>
    </div>
</div>

<!-- FORGOT PASSWORD -->
<div class="forget-bg hide" id="forgot">
    <div class="container">
        <h2>Forgot Password</h2>

        <label>Phone No:</label>
        <input type="text" id="fphone" value="+91" oninput="formatIndianPhone(this)">

        <button class="small-btn" onclick="sendForgotOTP()">Send OTP</button>

        <div id="otpDiv" style="display:none;">
            <label>Enter OTP:</label>
            <input type="text" id="forgotOtp">
            <button class="small-btn" onclick="verifyForgotOtp()">Verify OTP</button>
        </div>

        <div id="resetDiv" style="display:none;">
            <label>New Password:</label>
            <input type="password" id="newpass">

            <label>Confirm Password:</label>
            <input type="password" id="confirmpass">

            <button class="full-btn" onclick="resetPassword()">Reset Password</button>
        </div>
    </div>
</div>
